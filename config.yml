# Configuration used by the notebooks.
#
# Download your files first with the GOES & JPSS Data Downloader:
#     https://rmsm95.github.io/GOES-NESDIS_downlaoder/
# then point the folders below at wherever they landed. Nothing is downloaded
# by the notebooks.
#
# The DOMAIN is deliberately NOT in this file. Every notebook asks you for it
# directly:
#
#     DOMAIN = [LonMin, LonMax, LatMin, LatMax]
#     DOMAIN = None        # no crop: the complete scan
#
# so the area you look at is always your own choice, never a preset.

# ---------------------------------------------------------------------------
# Where your files are. Paths are relative to the repository root.
# One folder per product is only a suggestion; they can all be the same folder,
# since each notebook picks the files it needs by channel.
# ---------------------------------------------------------------------------
data:
  full_disk: data/full_disk        # ABI-L1b-RadF  (Full Disk)
  conus: data/conus                # ABI-L1b-RadC  (CONUS)
  mesoscale: data/mesoscale        # ABI-L1b-RadM  (Mesoscale)
  glm_abi: data/glm/abi            # the ABI scan under the lightning
  glm_flashes: data/glm/flashes    # GLM-L2-LCFA
  viirs: data/viirs                # VIIRS SDR bands + geolocation

# ---------------------------------------------------------------------------
# What each product needs and how it is scaled.
# "channels" is what you should download for that product.
# ---------------------------------------------------------------------------
products:
  band:
    channels: [C13]                # 10.3 um clean infrared window
    parameter: BT                  # BT = brightness temperature, Ref = reflectance
    cmap: gray_r                   # try "gray", "inferno", "viridis"
    vmin: 200                      # kelvin
    vmax: 290
    colorbar_label: Brightness Temperature (K)
  true_color:
    channels: [C01, C02, C03]      # blue, red, vegetation
  ash:
    channels: [C11, C13, C14, C15]
  volcanic_emissions:
    channels: [C09, C10, C11, C13]
  viirs_true_color:
    channels: [I01, I02, M03, M04, M05]   # plus the matching geolocation

# ---------------------------------------------------------------------------
# How the figures look.
# ---------------------------------------------------------------------------
style:
  coast_colour: red
  coast_width: 0.8
  coast_resolution: "10m"          # "10m", "50m" or "110m"

  grid_colour: white
  grid_alpha: 0.45
  grid_style: "--"
  grid_width: 0.5

  marker_lon: -163.9711            # Shishaldin; set to null to hide
  marker_lat: 54.7554
  marker_colour: red
  marker_size: 10

  flash_colour: yellow             # GLM flashes
  flash_size: 14
  flash_edge_width: 0.8

  figure_width: 13.5               # inches
  dpi: 160
  overview_stride: 8               # take every n-th pixel for a whole-scan view
